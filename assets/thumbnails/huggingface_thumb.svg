<!-- assets/thumbnails/huggingface_thumb.svg -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HuggingFace Dataset">
  <!-- background card -->
  <rect x="0" y="0" width="512" height="512" rx="36" fill="#1A1A2E"/>
  <!-- subtle ring -->
  <rect x="12" y="12" width="488" height="488" rx="30" fill="none" stroke="#2D2D4E" stroke-width="2"/>

  <!-- HuggingFace emoji face (centered, ~300px tall) -->
  <!-- Main face circle -->
  <circle cx="256" cy="248" r="148" fill="#FFD21E"/>

  <!-- Eyes -->
  <ellipse cx="204" cy="218" rx="22" ry="26" fill="#1A1A1A"/>
  <ellipse cx="308" cy="218" rx="22" ry="26" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="212" cy="210" r="7" fill="white"/>
  <circle cx="316" cy="210" r="7" fill="white"/>

  <!-- Blush cheeks -->
  <ellipse cx="168" cy="262" rx="28" ry="18" fill="#FF8C69" opacity="0.55"/>
  <ellipse cx="344" cy="262" rx="28" ry="18" fill="#FF8C69" opacity="0.55"/>

  <!-- Smile / mouth -->
  <path d="M198 278 Q256 328 314 278" stroke="#1A1A1A" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="256" cy="306" rx="28" ry="18" fill="#FF6B6B"/>

  <!-- Ears -->
  <ellipse cx="108" cy="248" rx="30" ry="38" fill="#FFD21E"/>
  <ellipse cx="404" cy="248" rx="30" ry="38" fill="#FFD21E"/>
  <ellipse cx="108" cy="248" rx="16" ry="22" fill="#FFB830"/>
  <ellipse cx="404" cy="248" rx="16" ry="22" fill="#FFB830"/>

  <!-- "HF" label text at bottom -->
  <text x="256" y="446" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="700" fill="#E5E7EB" letter-spacing="3">DATASET</text>
</svg>
